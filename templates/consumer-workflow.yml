# Copy this file to .github/workflows/code-review.yml in your repo.
# Replace OWNER with the user/org hosting panoptes.
# Requires an OPENROUTER_API_KEY secret in this repo (or the org).
# Optional: add .github/code-review-guidelines.md to this repo to define
# repo-specific review norms (see the panoptes README).
name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
    uses: OWNER/panoptes/.github/workflows/review.yml@v2
    secrets: inherit
    # Optional overrides:
    # with:
    #   model: moonshotai/kimi-k2.7-code-20260612
    #   extra_instructions: "Pay extra attention to database migrations."
    #   max_diff_lines: 8000
