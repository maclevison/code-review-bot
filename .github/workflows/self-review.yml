# Dogfood — panoptes reviews its OWN pull requests with its own reviewer.
#
# This is the end-to-end self-test: every PR here is reviewed by the exact
# reusable workflow shipped to consumers (see templates/consumer-workflow.yml),
# except it calls the workflow LOCALLY (`uses: ./…`) instead of by @tag, so a
# PR always exercises the reviewer as changed in that same PR.
#
# Requires an OPENROUTER_API_KEY secret on this repo (or its org). It is
# declared `required` by review.yml, so the call hard-fails if the secret is
# absent (add it under Settings → Secrets and variables → Actions).
#
# Advisory by design: do NOT add this job to branch-protection required checks.
# Fork PRs get a read-only token and no secrets, so the review is skipped/
# unavailable on external contributions — that is expected.
name: Self Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
    uses: ./.github/workflows/review.yml
    # Pass ONLY the key the reviewer needs — not `secrets: inherit`, which would
    # expose every repo/org secret to a workflow loaded from the PR branch.
    # Known dogfood tradeoff: because `uses: ./…` loads review.yml FROM the PR
    # branch, a same-repo branch that edits review.yml runs its own version with
    # this key. Blast radius is limited to OpenRouter credits — use a
    # spend-capped key so a leaked/abused key can't run up cost.
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    with:
      show_model_footer: true
