name: Code Review

on:
  workflow_call:
    inputs:
      model:
        description: "OpenRouter model id used for the review"
        type: string
        required: false
        default: "moonshotai/kimi-k2.7-code-20260612"
      base_url:
        description: "OpenAI-compatible base URL (OpenRouter by default)"
        type: string
        required: false
        default: "https://openrouter.ai/api/v1"
      extra_instructions:
        description: "Extra review instructions appended to the system prompt"
        type: string
        required: false
        default: ""
      max_diff_lines:
        description: "Skip the review when the PR diff exceeds this many lines"
        type: number
        required: false
        default: 5000
      guidelines_path:
        description: "Path (in the reviewed repo) to a Markdown file of repo-specific review guidelines; appended to the prompt when present"
        type: string
        required: false
        default: ".github/code-review-guidelines.md"
      require_zero_retention:
        description: "OpenRouter only: route only to providers that do not retain data (adds provider.data_collection=deny). Leave false for non-OpenRouter base_url."
        type: boolean
        required: false
        default: false
      bot_name:
        description: "Heading shown at the top of the review comment (Markdown; include an emoji yourself if you want one)"
        type: string
        required: false
        default: "👁 Panoptes"
      show_model_footer:
        description: "Show the '_Model: … advisory_' line as a footer at the foot of the comment (off by default)"
        type: boolean
        required: false
        default: false
      max_tokens:
        description: "Max completion tokens for the model reply. Set generously — reasoning models spend tokens thinking, and too low a cap truncates the review (finish_reason=length -> empty content). The default model is a reasoning model, so this budget must cover thinking + the written review."
        type: number
        required: false
        default: 16000
      reasoning_effort:
        description: "OpenRouter reasoning effort for thinking models (low|medium|high). 'low' keeps a reasoning model from spending its whole token budget thinking and leaving the review empty. Set to '' (empty) to omit the reasoning parameter."
        type: string
        required: false
        default: "low"
    secrets:
      OPENROUTER_API_KEY:
        required: true
    outputs:
      reviewed:
        description: "'true' only when a review actually completed and posted; '' otherwise (skipped, oversized, provider error, empty reply). Gate on this before trusting the counts."
        value: ${{ jobs.review.outputs.reviewed }}
      important:
        description: "Count of 🔴 Important findings in the review (accurate; uncapped)."
        value: ${{ jobs.review.outputs.important }}
      nit:
        description: "Count of 🟡 Nit findings LISTED inline (capped at the prompt's nit cap; may undercount total nits)."
        value: ${{ jobs.review.outputs.nit }}
      pre_existing:
        description: "Count of 🟣 Pre-existing findings in the review (accurate; uncapped)."
        value: ${{ jobs.review.outputs.pre_existing }}

jobs:
  review:
    outputs:
      reviewed: ${{ steps.review.outputs.reviewed }}
      important: ${{ steps.review.outputs.important }}
      nit: ${{ steps.review.outputs.nit }}
      pre_existing: ${{ steps.review.outputs.pre_existing }}
    # Never review drafts. Advisory by design: this job must not be made a
    # required status check.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      # The engine itself (diff triage, prompt assembly, provider call,
      # severity tally, fail-safe behavior) lives in bin/panoptes so it can
      # also run locally outside Actions — see README's "Run it locally".
      # This workflow is now a thin wrapper: fetch that script from THIS
      # repo at the ref actually running (so a consumer pinned to @v2 keeps
      # getting the @v2 engine, not whatever is on main), then shell out to
      # it in --pr mode.
      - name: Fetch panoptes
        id: fetch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # github.workflow_ref is "owner/repo/.github/workflows/review.yml@ref"
          # for a called reusable workflow.
          wf="${{ github.workflow_ref }}"
          repo="${wf%%/.github/*}"
          ref="${wf##*@}"
          gh api "repos/${repo}/contents/bin/panoptes?ref=${ref}" \
            -H "Accept: application/vnd.github.raw" > panoptes
          chmod +x panoptes

      - name: Review PR
        id: review
        env:
          GH_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MODEL: ${{ inputs.model }}
          BASE_URL: ${{ inputs.base_url }}
          MAX_LINES: ${{ inputs.max_diff_lines }}
          EXTRA: ${{ inputs.extra_instructions }}
          GUIDELINES_PATH: ${{ inputs.guidelines_path }}
          REQUIRE_ZDR: ${{ inputs.require_zero_retention }}
          BOT_NAME: ${{ inputs.bot_name }}
          SHOW_FOOTER: ${{ inputs.show_model_footer }}
          MAX_TOKENS: ${{ inputs.max_tokens }}
          REASONING_EFFORT: ${{ inputs.reasoning_effort }}
        run: |
          set -euo pipefail

          # PANOPTES_API_KEY is panoptes' preferred env var; OPENROUTER_API_KEY
          # (already set above, for back-compat with self-review.yml et al.)
          # is its fallback, so no extra plumbing is needed here.

          # Plain string, not an array: word-splits safely below since none
          # of these flags contain spaces, and keeps this step portable to
          # bash versions where `"${arr[@]}"` on an empty array misbehaves
          # under `set -u`.
          extra_flags=""
          [ "${REQUIRE_ZDR}" = "true" ] && extra_flags="${extra_flags} --zdr"
          [ "${SHOW_FOOTER}" = "true" ] && extra_flags="${extra_flags} --show-model-footer"

          stderr_file="$(mktemp)"
          # shellcheck disable=SC2086 # extra_flags is a deliberately unquoted flag list
          json_out=$(./panoptes \
            --pr "${PR_NUMBER}" --repo "${REPO}" \
            --base-url "${BASE_URL}" --model "${MODEL}" \
            --guidelines "${GUIDELINES_PATH}" \
            --extra "${EXTRA}" \
            --max-diff-lines "${MAX_LINES}" \
            --bot-name "${BOT_NAME}" \
            --max-tokens "${MAX_TOKENS}" \
            --reasoning-effort "${REASONING_EFFORT}" \
            ${extra_flags} \
            --comment --format json \
            2> "$stderr_file") || true
          # Surface panoptes' own log lines (diff size, guidelines/REVIEW.md
          # hits, transport failures, usage, tally) in the job log.
          cat "$stderr_file"

          reviewed=$(printf '%s' "$json_out" | jq -r '.reviewed')
          important=$(printf '%s' "$json_out" | jq -r '.important')
          nit=$(printf '%s' "$json_out" | jq -r '.nit')
          pre_existing=$(printf '%s' "$json_out" | jq -r '.pre_existing')
          used_model=$(printf '%s' "$json_out" | jq -r '.model')

          # Token usage is diagnostic-only and lives in panoptes' stderr log
          # (not the --format json contract), so parse it back out of the
          # captured stderr for the job-summary usage table. Absent (e.g. the
          # cmd transport, or a diff-too-large skip) -> "?" placeholders.
          usage_line=$(grep '^Usage — ' "$stderr_file" | tail -n1 || true)
          if [ -n "$usage_line" ]; then
            ptok=$(printf '%s' "$usage_line" | sed -n 's/.*prompt:\([^ ]*\).*/\1/p')
            ctok=$(printf '%s' "$usage_line" | sed -n 's/.*completion:\([^ ]*\).*/\1/p')
            ttok=$(printf '%s' "$usage_line" | sed -n 's/.*total:\([^ ]*\).*/\1/p')
            cost=$(printf '%s' "$usage_line" | sed -n 's/.*cost:\([^ ]*\).*/\1/p')
            finish=$(printf '%s' "$usage_line" | sed -n 's/.*finish_reason:\([^ ]*\).*/\1/p')
          else
            ptok="?"; ctok="?"; ttok="?"; cost="n/a"; finish="?"
          fi

          {
            echo "### :robot: Code review — usage"
            echo ""
            echo "| Model | Prompt | Completion | Total | Cost (USD) | Finish |"
            echo "|---|---|---|---|---|---|"
            echo "| \`${used_model}\` | ${ptok} | ${ctok} | ${ttok} | ${cost} | ${finish} |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Expose counts as workflow_call outputs so a consumer's gating job
          # can read them via needs.review.outputs.* — only when a review
          # actually completed, so a gate can fail closed (matches the
          # pre-extraction engine: the `reviewed` output stays unset/empty on
          # skip/failure rather than reporting a misleading 0/0/0).
          if [ "$reviewed" = "true" ]; then
            severity_json=$(jq -n \
              --argjson important "$important" \
              --argjson nit "$nit" \
              --argjson pre_existing "$pre_existing" \
              '{important: $important, nit: $nit, pre_existing: $pre_existing}' -c)
            {
              echo "reviewed=true"
              echo "important=${important}"
              echo "nit=${nit}"
              echo "pre_existing=${pre_existing}"
            } >> "$GITHUB_OUTPUT"
            {
              echo ""
              echo "Findings: 🔴 ${important} · 🟡 ${nit} · 🟣 ${pre_existing}"
              echo ""
              echo "<!-- review-severity: ${severity_json} -->"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          rm -f "$stderr_file"
