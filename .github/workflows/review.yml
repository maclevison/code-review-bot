name: Code Review

on:
  workflow_call:
    inputs:
      model:
        description: "OpenRouter model id used for the review"
        type: string
        required: false
        default: "moonshotai/kimi-k2.7-code-20260612"
      base_url:
        description: "OpenAI-compatible base URL (OpenRouter by default)"
        type: string
        required: false
        default: "https://openrouter.ai/api/v1"
      extra_instructions:
        description: "Extra review instructions appended to the system prompt"
        type: string
        required: false
        default: ""
      max_diff_lines:
        description: "Skip the review when the PR diff exceeds this many lines"
        type: number
        required: false
        default: 5000
      guidelines_path:
        description: "Path (in the reviewed repo) to a Markdown file of repo-specific review guidelines; appended to the prompt when present"
        type: string
        required: false
        default: ".github/code-review-guidelines.md"
      require_zero_retention:
        description: "OpenRouter only: route only to providers that do not retain data (adds provider.data_collection=deny). Leave false for non-OpenRouter base_url."
        type: boolean
        required: false
        default: false
      bot_name:
        description: "Heading shown at the top of the review comment (Markdown; include an emoji yourself if you want one)"
        type: string
        required: false
        default: "рџ¤– Kimo Reviewer"
      show_model_footer:
        description: "Show the '_Model: вЂ¦ advisory_' line under the heading"
        type: boolean
        required: false
        default: false
      max_tokens:
        description: "Max completion tokens for the model reply. Set generously вЂ” reasoning models spend tokens thinking, and too low a cap truncates the review (finish_reason=length -> empty content)."
        type: number
        required: false
        default: 8000
      reasoning_effort:
        description: "OpenRouter reasoning effort for thinking models (low|medium|high). 'low' keeps a reasoning model from spending its whole token budget thinking and leaving the review empty. Set to '' (empty) to omit the reasoning parameter."
        type: string
        required: false
        default: "low"
    secrets:
      OPENROUTER_API_KEY:
        required: true

jobs:
  review:
    # Never review drafts. Advisory by design: this job must not be made a
    # required status check.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    concurrency:
      group: code-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Review PR
        env:
          GH_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MODEL: ${{ inputs.model }}
          BASE_URL: ${{ inputs.base_url }}
          MAX_LINES: ${{ inputs.max_diff_lines }}
          EXTRA: ${{ inputs.extra_instructions }}
          GUIDELINES_PATH: ${{ inputs.guidelines_path }}
          REQUIRE_ZDR: ${{ inputs.require_zero_retention }}
          BOT_NAME: ${{ inputs.bot_name }}
          SHOW_FOOTER: ${{ inputs.show_model_footer }}
          MAX_TOKENS: ${{ inputs.max_tokens }}
          REASONING_EFFORT: ${{ inputs.reasoning_effort }}
          SYSTEM_PROMPT: |
            You are an automated code reviewer for a GitHub pull request. You
            are given a unified diff. Review it and write ONE markdown comment.

            Focus, in priority order:
            1. Bugs and logic errors вЂ” edge cases, null/undefined handling,
               incorrect conditions, off-by-one errors, race conditions.
            2. Quality and maintainability вЂ” naming, duplication, complexity,
               missing tests for changed behavior.
            3. Performance вЂ” N+1 queries, expensive loops, unnecessary
               allocations, blocking calls.

            Severity markers (use these exactly):
            - рџ”ґ Important вЂ” a bug that should be fixed before merging.
            - рџџЎ Nit вЂ” minor issue, worth fixing but not blocking.
            - рџџЈ Pre-existing вЂ” a bug visible in the diff context but NOT
              introduced by this PR.

            Rules:
            - Write in English. Advisory tone вЂ” you never block the merge.
            - Prioritize meaningful findings over nitpicks. Do NOT restate the
              diff or post praise-only text.
            - Structure: OPEN with a one-line tally like `рџ”ґ 2 В· рџџЎ 3 В· рџџЈ 1`,
              or `No blocking issues` when there are no рџ”ґ/рџџЈ. Then list each
              finding prefixed with its severity marker and citing `path:line`
              (new-file line numbers). A clean review still names what was
              checked: output `No blocking issues` plus one line of what was
              verified.
            - Nit cap: list at most 5 рџџЎ Nit findings inline; if there are more,
              append "plus N similar nits" to the tally instead of listing them.
            - Pre-existing: if a clear bug shows in the surrounding diff context
              but this PR did not introduce it, tag it рџџЈ and do not count it
              against the change.
            - Keep it concise. Output GitHub-flavored markdown only вЂ” no
              preamble such as "Here is the review".
        run: |
          set -euo pipefail

          # Fetch the PR diff via the API (no checkout needed).
          diff=$(gh pr diff "$PR_NUMBER" --repo "$REPO") || {
            echo "Failed to fetch diff; nothing to review."
            exit 0
          }

          if [ -z "$diff" ]; then
            echo "Empty diff; nothing to review."
            exit 0
          fi

          lines=$(printf '%s' "$diff" | wc -l | tr -d ' ') || lines=0
          echo "Diff has ${lines} lines (limit: ${MAX_LINES})"
          if [ "$lines" -gt "$MAX_LINES" ]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              ":robot: Code review skipped: the diff has ${lines} lines, above the ${MAX_LINES}-line limit. Split the PR or raise \`max_diff_lines\`." || true
            exit 0
          fi

          # Assemble the system prompt: baseline + repo-local guidelines
          # (optional, read at the PR head commit) + inline extra instructions.
          system="$SYSTEM_PROMPT"

          guidelines=$(gh api "repos/${REPO}/contents/${GUIDELINES_PATH}?ref=${HEAD_SHA}" \
            -H "Accept: application/vnd.github.raw" 2>/dev/null) || guidelines=""
          if [ -n "$guidelines" ]; then
            echo "Loaded repo review guidelines from ${GUIDELINES_PATH}"
            system="${system}"$'\n\nRepository-specific review guidelines (authored by the repo maintainers вЂ” follow them; they refine the rules above):\n'"${guidelines}"
          else
            echo "No repo guidelines at ${GUIDELINES_PATH}; using defaults."
          fi

          if [ -n "$EXTRA" ]; then
            system="${system}"$'\n\nAdditional project-specific instructions:\n'"${EXTRA}"
          fi

          # Build the request body with jq so the diff is safely JSON-encoded.
          # When require_zero_retention is true, add OpenRouter's
          # provider.data_collection=deny so the request only routes to
          # providers that do not retain data.
          payload=$(jq -n \
            --arg model "$MODEL" \
            --arg system "$system" \
            --arg user "$diff" \
            --argjson zdr "${REQUIRE_ZDR:-false}" \
            --argjson mt "${MAX_TOKENS:-8000}" \
            --arg reasoning "${REASONING_EFFORT:-}" \
            '{model: $model, max_tokens: $mt, messages: [
               {role: "system", content: $system},
               {role: "user", content: ("Review this pull request diff:\n\n" + $user)}
             ]}
             + (if $zdr then {provider: {data_collection: "deny"}} else {} end)
             + (if $reasoning != "" then {reasoning: {effort: $reasoning}} else {} end)')

          # Call the OpenAI-compatible endpoint (OpenRouter by default).
          resp=$(curl -sS --fail-with-body -X POST "${BASE_URL}/chat/completions" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${REPO}" \
            -H "X-Title: code-review-bot" \
            -d "$payload") || {
              echo "Provider request failed. Response: ${resp:-<none>}"
              gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
                ":robot: Code review unavailable: the model provider returned an error (check the OPENROUTER_API_KEY secret and your credit balance)." || true
              exit 0
            }

          review=$(printf '%s' "$resp" | jq -r '.choices[0].message.content // empty') || {
            echo "Malformed (non-JSON) provider response: $resp"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              ":robot: Code review unavailable: the model provider returned an unexpected response." || true
            exit 0
          }

          # Observability: log token usage (and cost when the provider reports
          # it) to the job summary. `.usage` is present on OpenAI-compatible
          # non-streaming responses; `.usage.cost` is OpenRouter-specific.
          ptok=$(printf '%s' "$resp" | jq -r '.usage.prompt_tokens // "?"')
          ctok=$(printf '%s' "$resp" | jq -r '.usage.completion_tokens // "?"')
          ttok=$(printf '%s' "$resp" | jq -r '.usage.total_tokens // "?"')
          cost=$(printf '%s' "$resp" | jq -r '.usage.cost // empty')
          finish=$(printf '%s' "$resp" | jq -r '.choices[0].finish_reason // "?"')
          echo "Usage вЂ” prompt:${ptok} completion:${ctok} total:${ttok} cost:${cost:-n/a} finish_reason:${finish}"
          if [ "$finish" = "length" ]; then
            echo "WARNING: finish_reason=length вЂ” the reply hit max_tokens (${MAX_TOKENS}). The review may be truncated or empty; raise max_tokens or use a non-reasoning model."
          fi
          {
            echo "### :robot: Code review вЂ” usage"
            echo ""
            echo "| Model | Prompt | Completion | Total | Cost (USD) | Finish |"
            echo "|---|---|---|---|---|---|"
            echo "| \`${MODEL}\` | ${ptok} | ${ctok} | ${ttok} | ${cost:-n/a} | ${finish} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$review" ]; then
            echo "No review content in response (finish_reason=${finish}): $resp"
            hint=""
            if [ "$finish" = "length" ]; then
              hint=" (finish_reason=length вЂ” the reply hit max_tokens=${MAX_TOKENS}; raise max_tokens or use a non-reasoning model)"
            fi
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body \
              ":robot: Code review unavailable: the model returned an empty response.${hint}" || true
            exit 0
          fi

          # GitHub caps comment bodies at 65536 chars; truncate defensively.
          if [ "${#review}" -gt 60000 ]; then
            review="${review:0:60000}"$'\n\n_review truncated to fit the GitHub comment size limit._'
          fi

          # Post the single advisory review comment.
          {
            echo "## ${BOT_NAME}"
            echo ""
            if [ "$SHOW_FOOTER" = "true" ]; then
              echo "_Model: \`${MODEL}\` via OpenRouter вЂ” advisory, does not block merge._"
              echo ""
            fi
            printf '%s\n' "$review"
          } > review.md
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file review.md || echo "Failed to post review comment"
