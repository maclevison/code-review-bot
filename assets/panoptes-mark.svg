<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Panoptes">
  <rect width="256" height="256" rx="56" fill="#0F1116"/>
  <g fill="#F5F5F5">
