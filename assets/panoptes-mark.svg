    <!-- eye B (top-right) -->
    <path d="M131 104 Q158 85 185 104 Q158 123 131 104 Z"/>
    <circle cx="158" cy="104" r="9" fill="#0F1116"/>
    <!-- eye C (bottom-center) -->
    <path d="M101 160 Q128 141 155 160 Q128 179 101 160 Z"/>
